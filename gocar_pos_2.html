<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoCar — Punto de Venta</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red:#E31E24; --red-dark:#B81519; --red-dim:rgba(227,30,36,.1);
  --black:#0A0A0A; --dark:#111; --dark2:#171717; --dark3:#1F1F1F;
  --border:#2A2A2A; --gray:#666; --gray2:#999; --white:#fff;
  --green:#16a34a; --green-dim:rgba(22,163,74,.1);
  --yellow:#f59e0b; --blue:#3b82f6;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Barlow',sans-serif;background:var(--dark);color:var(--white);min-height:100vh;overflow-x:hidden;}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;background:var(--black);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem;}
.login-box{background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:2.5rem 2rem;width:100%;max-width:340px;text-align:center;}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:2.5rem;letter-spacing:-1px;color:var(--red);margin-bottom:.2rem;}
.login-logo em{color:var(--white);font-style:normal;}
.login-sub{font-size:.75rem;letter-spacing:3px;text-transform:uppercase;color:var(--gray2);margin-bottom:2rem;}
.login-label{display:block;text-align:left;font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:.5rem;}
.login-input{width:100%;background:var(--dark3);border:1.5px solid var(--border);color:var(--white);font-size:1.2rem;padding:.85rem 1rem;border-radius:6px;letter-spacing:4px;text-align:center;outline:none;transition:border-color .2s;margin-bottom:1rem;font-family:'Barlow',sans-serif;}
.login-input:focus{border-color:var(--red);}
.login-btn{width:100%;background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:2px;text-transform:uppercase;border:none;padding:.9rem;border-radius:6px;cursor:pointer;transition:background .2s;}
.login-btn:hover{background:var(--red-dark);}
.login-err{color:var(--red);font-size:.82rem;margin-top:.5rem;min-height:1.2rem;}

/* ── TOPBAR ── */
#app{display:none;}
.topbar{background:var(--black);border-bottom:2px solid var(--red);padding:0 1rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.4rem;letter-spacing:-1px;color:var(--red);}
.topbar-logo em{color:var(--white);font-style:normal;}
.topbar-right{display:flex;align-items:center;gap:.75rem;}
.topbar-badge{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:var(--red-dim);color:var(--red);border:1px solid rgba(227,30,36,.4);padding:.25rem .6rem;border-radius:4px;}
.topbar-date{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;color:var(--gray2);letter-spacing:1px;}
.topbar-link{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray2);text-decoration:none;border:1px solid var(--border);padding:.3rem .7rem;border-radius:4px;transition:all .2s;}
.topbar-link:hover{border-color:var(--gray2);color:var(--white);}

/* ── LAYOUT ── */
.pos-layout{display:grid;grid-template-columns:1fr 380px;min-height:calc(100vh - 56px);gap:0;}

/* ── LEFT: BUSCAR + PRODUCTOS ── */
.pos-left{padding:1.25rem;overflow-y:auto;max-height:calc(100vh - 56px);}

.search-bar{display:flex;gap:.75rem;margin-bottom:1.25rem;align-items:center;}
.search-wrap{position:relative;flex:1;}
.search-icon{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--red);width:18px;height:18px;pointer-events:none;}
.search-input{width:100%;background:var(--dark2);border:1.5px solid var(--border);color:var(--white);font-family:'Barlow',sans-serif;font-size:1rem;padding:.8rem .85rem .8rem 2.75rem;border-radius:8px;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--red);}
.search-input::placeholder{color:var(--gray);}
.search-clear{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray);cursor:pointer;font-size:1.1rem;line-height:1;display:none;}

.cat-tabs{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap;}
.cat-tab{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:.35rem .85rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--gray2);cursor:pointer;transition:all .2s;}
.cat-tab:hover{border-color:var(--red);color:var(--red);}
.cat-tab.active{background:var(--red);border-color:var(--red);color:#fff;}

.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem;}
.prod-card{background:var(--dark2);border:1.5px solid var(--border);border-radius:8px;padding:1rem;cursor:pointer;transition:all .2s;position:relative;user-select:none;}
.prod-card:hover{border-color:var(--red);background:var(--dark3);}
.prod-card.out{opacity:.5;cursor:not-allowed;}
.prod-card.out:hover{border-color:var(--border);background:var(--dark2);}
.prod-card-cat{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:.3rem;}
.prod-card-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;color:var(--white);line-height:1.2;margin-bottom:.5rem;}
.prod-card-sku{font-size:.65rem;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:.5rem;}
.prod-card-footer{display:flex;justify-content:space-between;align-items:center;}
.prod-card-price{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;color:var(--green);}
.prod-card-stock{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:.15rem .4rem;border-radius:3px;}
.stock-ok{background:rgba(22,163,74,.15);color:#4ade80;}
.stock-low{background:rgba(245,158,11,.15);color:#fbbf24;}
.stock-out{background:rgba(107,114,128,.15);color:#9ca3af;}
.prod-card-add{position:absolute;top:.6rem;right:.6rem;width:24px;height:24px;background:var(--red);border:none;border-radius:50%;color:#fff;font-size:1rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.prod-card:hover .prod-card-add{opacity:1;}

.no-results{text-align:center;padding:3rem 1rem;color:var(--gray);font-size:.9rem;}

/* ── RIGHT: CARRITO / VENTA ── */
.pos-right{background:var(--dark2);border-left:1px solid var(--border);display:flex;flex-direction:column;max-height:calc(100vh - 56px);}

.cart-head{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cart-head h2{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1rem;letter-spacing:2px;text-transform:uppercase;color:var(--red);}
.cart-clear{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray);background:none;border:1px solid var(--border);padding:.25rem .6rem;border-radius:4px;cursor:pointer;transition:all .2s;}
.cart-clear:hover{border-color:var(--red);color:var(--red);}

.cart-items{flex:1;overflow-y:auto;padding:.75rem 1.25rem;}
.cart-empty{text-align:center;padding:3rem 1rem;color:var(--gray);}
.cart-empty-icon{font-size:2.5rem;margin-bottom:.75rem;opacity:.4;}
.cart-empty p{font-size:.85rem;line-height:1.5;}

.cart-item{display:flex;align-items:center;gap:.75rem;padding:.65rem 0;border-bottom:1px solid #1a1a1a;}
.cart-item:last-child{border-bottom:none;}
.cart-item-info{flex:1;min-width:0;}
.cart-item-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cart-item-sku{font-size:.68rem;color:var(--gray);letter-spacing:1px;text-transform:uppercase;}
.cart-item-price{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.85rem;color:var(--green);white-space:nowrap;}
.qty-row{display:flex;align-items:center;gap:.4rem;margin-top:.25rem;}
.qty-btn{width:22px;height:22px;border:1px solid var(--border);background:var(--dark3);border-radius:3px;color:var(--white);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.qty-btn:hover{border-color:var(--red);color:var(--red);}
.qty-btn.del{border-color:rgba(227,30,36,.3);color:var(--red);}
.qty-n{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:700;min-width:20px;text-align:center;}

/* ── CART FOOTER ── */
.cart-foot{border-top:1px solid var(--border);padding:1rem 1.25rem;}
.cart-subtotal{display:flex;justify-content:space-between;font-size:.85rem;color:var(--gray2);margin-bottom:.4rem;}
.cart-total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1rem;}
.cart-total-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:2px;text-transform:uppercase;color:var(--red);}
.cart-total-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:2rem;letter-spacing:-1px;color:var(--white);}

/* Vendedor */
.vendedor-row{display:flex;gap:.5rem;margin-bottom:.75rem;align-items:center;}
.vendedor-label{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);white-space:nowrap;}
.vendedor-select{flex:1;background:var(--dark3);border:1.5px solid var(--border);color:var(--white);font-family:'Barlow',sans-serif;font-size:.85rem;padding:.4rem .65rem;border-radius:5px;outline:none;transition:border-color .2s;}
.vendedor-select:focus{border-color:var(--red);}

/* Canal */
.canal-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.4rem;margin-bottom:.75rem;}
.canal-btn{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:.5rem;border-radius:5px;border:1.5px solid var(--border);background:transparent;color:var(--gray2);cursor:pointer;transition:all .2s;text-align:center;}
.canal-btn:hover{border-color:var(--red);color:var(--red);}
.canal-btn.active{background:var(--red);border-color:var(--red);color:#fff;}

/* Pago */
.pago-btns{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-bottom:.85rem;}
.pago-btn{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:.5rem;border-radius:5px;border:1.5px solid var(--border);background:transparent;color:var(--gray2);cursor:pointer;transition:all .2s;}
.pago-btn:hover{border-color:var(--blue);color:var(--blue);}
.pago-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}

.btn-confirmar{width:100%;background:var(--green);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:2px;text-transform:uppercase;border:none;padding:1rem;border-radius:8px;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;}
.btn-confirmar:hover{background:#15803d;}
.btn-confirmar:disabled{background:var(--gray);cursor:not-allowed;}

/* ── MODAL ÉXITO ── */
.success-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .3s;}
.success-overlay.open{opacity:1;pointer-events:all;}
.success-box{background:var(--dark2);border:1px solid var(--green);border-radius:12px;padding:2rem;max-width:340px;width:100%;text-align:center;transform:scale(.95);transition:transform .3s;}
.success-overlay.open .success-box{transform:scale(1);}
.success-icon{font-size:3rem;margin-bottom:.75rem;}
.success-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:1px;text-transform:uppercase;color:var(--green);margin-bottom:.5rem;}
.success-sub{font-size:.88rem;color:var(--gray2);margin-bottom:.25rem;line-height:1.5;}
.success-total{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:2rem;letter-spacing:-1px;color:var(--white);margin:.75rem 0;}
.success-detail{background:var(--dark3);border-radius:6px;padding:.75rem;margin-bottom:1.25rem;text-align:left;}
.success-detail-row{display:flex;justify-content:space-between;font-size:.8rem;padding:.2rem 0;color:var(--gray2);}
.success-detail-row span:last-child{color:var(--white);font-weight:600;}
.success-btn{width:100%;background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:2px;text-transform:uppercase;border:none;padding:.85rem;border-radius:6px;cursor:pointer;transition:background .2s;}
.success-btn:hover{background:var(--red-dark);}

/* ── TOAST ── */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--dark2);color:var(--white);padding:.75rem 1.25rem;border-radius:8px;font-size:.88rem;z-index:1000;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;border-left:3px solid var(--red);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.green{border-color:var(--green);}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .pos-layout{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
  .pos-right{max-height:none;border-left:none;border-top:1px solid var(--border);}
  .pos-left{max-height:50vh;}
  .prod-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Go<em>CAR</em></div>
    <div class="login-sub">Punto de Venta</div>
    <label class="login-label">PIN de acceso</label>
    <input type="password" class="login-input" id="pinInput" maxlength="4" placeholder="••••">
    <button class="login-btn" onclick="checkPin()">Ingresar</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Go<em>CAR</em></div>
    <div class="topbar-right">
      <span class="topbar-badge">POS</span>
      <span class="topbar-date" id="topbarDate"></span>
      <a href="gocar_web.html" class="topbar-link">← Web</a>
    </div>
  </div>

  <div class="pos-layout">

    <!-- IZQUIERDA: CATÁLOGO -->
    <div class="pos-left">

      <!-- Buscador -->
      <div class="search-bar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Buscar por nombre o SKU..." oninput="onSearch()">
          <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
        </div>
      </div>

      <!-- Categorías -->
      <div class="cat-tabs" id="catTabs"></div>

      <!-- Grid de productos -->
      <div class="prod-grid" id="prodGrid"></div>

    </div>

    <!-- DERECHA: CARRITO -->
    <div class="pos-right">
      <div class="cart-head">
        <h2>🧾 Venta actual</h2>
        <button class="cart-clear" onclick="clearCart()">Limpiar</button>
      </div>

      <div class="cart-items" id="cartItems">
        <div class="cart-empty">
          <div class="cart-empty-icon">🛒</div>
          <p>Agrega productos<br>desde el catálogo</p>
        </div>
      </div>

      <div class="cart-foot">
        <!-- Subtotal items -->
        <div class="cart-subtotal">
          <span id="cartItemCount">0 productos</span>
          <span id="cartSubtotal">$0</span>
        </div>
        <div class="cart-total-row">
          <span class="cart-total-label">Total</span>
          <span class="cart-total-val" id="cartTotal">$0</span>
        </div>

        <!-- Vendedor -->
        <div class="vendedor-row">
          <span class="vendedor-label">Vendedor</span>
          <select class="vendedor-select" id="vendedorSelect">
            <option value="Vendedor 1">Vendedor 1</option>
            <option value="Vendedor 2">Vendedor 2</option>
            <option value="Dueño">Dueño</option>
          </select>
        </div>

        <!-- Canal de venta -->
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:.4rem;">Canal</div>
        <div class="canal-btns">
          <button class="canal-btn active" onclick="setCanal('Tienda',this)">🏪 Tienda</button>
          <button class="canal-btn" onclick="setCanal('WhatsApp',this)">💬 WhatsApp</button>
          <button class="canal-btn" onclick="setCanal('Web',this)">🌐 Web</button>
        </div>

        <!-- Medio de pago -->
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:.4rem;">Medio de pago</div>
        <div class="pago-btns">
          <button class="pago-btn active" onclick="setPago('Efectivo',this)">💵 Efectivo</button>
          <button class="pago-btn" onclick="setPago('Débito',this)">💳 Débito</button>
          <button class="pago-btn" onclick="setPago('Crédito',this)">💳 Crédito</button>
          <button class="pago-btn" onclick="setPago('Transferencia',this)">🏦 Transferencia</button>
        </div>

        <!-- Confirmar -->
        <button class="btn-confirmar" id="btnConfirmar" onclick="confirmarVenta()" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Confirmar Venta
        </button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL ÉXITO -->
<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="success-icon">✅</div>
    <div class="success-title">¡Venta registrada!</div>
    <div class="success-sub" id="successSub"></div>
    <div class="success-total" id="successTotal"></div>
    <div class="success-detail" id="successDetail"></div>
    <button class="success-btn" onclick="closeSuccess()">Nueva venta</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
var PIN = '1111';
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZ7frh6i0SU8HHtV2t4ebFh8bLEATqoJagBCUiQJ-Ncewd6E2SUAtsK1N_KM_aK7fg/exec';
var SHEETS_WEBAPI   = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSckkgJQbQkgSf7HA7NOX7y_LLrSjeJ7nQZ7WcZRwCYVkXe9_gUnkHYAKl9R8KX1ww3xUJQDXXZ1fi3/pub?gid=1905089566&single=true&output=csv';

// ── DATOS BASE (respaldo) ──
var PRODUCTOS = [
  { sku:'BAT-60AH-GEN',    nombre:'Bateria 60Ah Generica',        cat:'Baterias',    precio:65000, stock:8,  activo:true },
  { sku:'FRE-KIA-RIO-PD',  nombre:'Pastillas Delanteras Kia Rio', cat:'Frenos',      precio:32000, stock:1,  activo:true },
  { sku:'FIL-ACE-HYUN-01', nombre:'Filtro Aceite Hyundai/Kia',   cat:'Filtros',     precio:7000,  stock:17, activo:true },
  { sku:'COR-ACC-6PK',     nombre:'Correa Accesorios 6PK',        cat:'Correas',     precio:14000, stock:8,  activo:true },
  { sku:'LUB-5W30-4L',     nombre:'Aceite Motor 5W30 4L',         cat:'Lubricantes', precio:29000, stock:12, activo:true }
];

// ── ESTADO ──
var cart      = [];
var canalActual = 'Tienda';
var pagoActual  = 'Efectivo';
var currentCat  = 'todos';
var searchTerm  = '';

// ── UTILS ──
function fmt(n){ return '$' + Math.round(n).toLocaleString('es-CL'); }
function el(id){ return document.getElementById(id); }

// ── LOGIN ──
function checkPin() {
  var val = el('pinInput').value;
  if (val === PIN) {
    el('loginScreen').style.display = 'none';
    el('app').style.display = 'block';
    initApp();
  } else {
    el('loginErr').textContent = 'PIN incorrecto';
    el('pinInput').value = '';
    setTimeout(function(){ el('loginErr').textContent = ''; }, 2000);
  }
}
el('pinInput').addEventListener('keydown', function(e){ if(e.key==='Enter') checkPin(); });

// ── INIT ──
function initApp() {
  // Fecha en topbar
  var now = new Date();
  var dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  el('topbarDate').textContent = dias[now.getDay()] + ' ' + now.getDate() + ' ' + meses[now.getMonth()];

  // Cargar productos desde Sheets
  loadProductos();
}

function loadProductos() {
  var PROXY = 'https://corsproxy.io/?';
  var xhr = new XMLHttpRequest();
  xhr.timeout = 7000;
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) { return; }
    if (xhr.status === 200 && xhr.responseText) {
      try {
        var rows = parseWebAPI(xhr.responseText);
        if (rows.length > 0) {
          // Actualizar stock y precios desde Sheets
          for (var i = 0; i < rows.length; i++) {
            for (var j = 0; j < PRODUCTOS.length; j++) {
              if (PRODUCTOS[j].sku === rows[i].sku) {
                PRODUCTOS[j].stock  = rows[i].stock;
                PRODUCTOS[j].precio = rows[i].precio;
              }
            }
          }
        }
      } catch(e) {}
    }
    renderCats();
    renderProductos();
  };
  xhr.ontimeout = function(){ renderCats(); renderProductos(); };
  xhr.onerror   = function(){ renderCats(); renderProductos(); };
  try {
    xhr.open('GET', PROXY + encodeURIComponent(SHEETS_WEBAPI), true);
    xhr.send();
  } catch(e){ renderCats(); renderProductos(); }
}

function parseWebAPI(csv) {
  var lines = csv.trim().split('\n');
  if (lines.length < 2) { return []; }
  var headers = lines[0].split(',').map(function(h){
    return h.trim().replace(/^"|"$/g,'').toLowerCase().replace(/ /g,'_');
  });
  var result = [];
  for (var r = 1; r < lines.length; r++) {
    var vals = [], cur = '', inQ = false;
    for (var c = 0; c < lines[r].length; c++) {
      var ch = lines[r][c];
      if (ch==='"') { inQ=!inQ; }
      else if (ch===',' && !inQ) { vals.push(cur.trim()); cur=''; }
      else { cur+=ch; }
    }
    vals.push(cur.trim());
    var row = {};
    for (var h = 0; h < headers.length; h++) {
      row[headers[h]] = (vals[h]||'').replace(/^"|"$/g,'').trim();
    }
    if (!row['sku']) { continue; }
    result.push({
      sku:    row['sku'],
      stock:  parseInt(row['stock_actual']||row['stock actual']||'0')||0,
      precio: parseInt(row['precio_venta']||row['precio venta']||'0')||0,
      activo: (row['activo']||'').toUpperCase()==='SI'
    });
  }
  return result;
}

// ── CATEGORÍAS ──
function renderCats() {
  var cats = ['todos'];
  for (var i = 0; i < PRODUCTOS.length; i++) {
    if (PRODUCTOS[i].activo && cats.indexOf(PRODUCTOS[i].cat) === -1) {
      cats.push(PRODUCTOS[i].cat);
    }
  }
  var html = '';
  for (var i = 0; i < cats.length; i++) {
    var c = cats[i];
    var label = c === 'todos' ? 'Todos' : c;
    var active = c === currentCat ? ' active' : '';
    html += '<button class="cat-tab' + active + '" onclick="setCat(\'' + c + '\',this)">' + label + '</button>';
  }
  el('catTabs').innerHTML = html;
}

function setCat(cat, btn) {
  currentCat = cat;
  var btns = document.querySelectorAll('.cat-tab');
  for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('active'); }
  btn.classList.add('active');
  renderProductos();
}

// ── PRODUCTOS ──
function renderProductos() {
  var term = searchTerm.toLowerCase();
  var list = PRODUCTOS.filter(function(p) {
    if (!p.activo) { return false; }
    if (currentCat !== 'todos' && p.cat !== currentCat) { return false; }
    if (term && p.nombre.toLowerCase().indexOf(term) === -1 && p.sku.toLowerCase().indexOf(term) === -1) { return false; }
    return true;
  });

  if (!list.length) {
    el('prodGrid').innerHTML = '<div class="no-results">No se encontraron productos</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < list.length; i++) {
    var p = list[i];
    var stockClass = p.stock === 0 ? 'stock-out' : p.stock <= 2 ? 'stock-low' : 'stock-ok';
    var stockLabel = p.stock === 0 ? 'Sin stock' : p.stock <= 2 ? 'Último: ' + p.stock : p.stock + ' u.';
    var outClass   = p.stock === 0 ? ' out' : '';
    var onclick    = p.stock === 0 ? '' : ' onclick="addToCart(\'' + p.sku + '\')"';
    html += '<div class="prod-card' + outClass + '"' + onclick + '>'
      + '<div class="prod-card-cat">' + p.cat + '</div>'
      + '<div class="prod-card-name">' + p.nombre + '</div>'
      + '<div class="prod-card-sku">' + p.sku + '</div>'
      + '<div class="prod-card-footer">'
      + '<div class="prod-card-price">' + fmt(p.precio) + '</div>'
      + '<span class="prod-card-stock ' + stockClass + '">' + stockLabel + '</span>'
      + '</div>'
      + (p.stock > 0 ? '<button class="prod-card-add" onclick="event.stopPropagation();addToCart(\'' + p.sku + '\')">+</button>' : '')
      + '</div>';
  }
  el('prodGrid').innerHTML = html;
}

// ── BUSCAR ──
function onSearch() {
  searchTerm = el('searchInput').value;
  el('searchClear').style.display = searchTerm ? 'block' : 'none';
  renderProductos();
}

function clearSearch() {
  el('searchInput').value = '';
  searchTerm = '';
  el('searchClear').style.display = 'none';
  renderProductos();
}

// ── CARRITO ──
function addToCart(sku) {
  var p = null;
  for (var i = 0; i < PRODUCTOS.length; i++) { if (PRODUCTOS[i].sku === sku) { p = PRODUCTOS[i]; break; } }
  if (!p || p.stock === 0) { return; }

  var existing = null;
  for (var i = 0; i < cart.length; i++) { if (cart[i].sku === sku) { existing = cart[i]; break; } }

  if (existing) {
    if (existing.qty >= p.stock) {
      showToast('Sin más stock disponible', false);
      return;
    }
    existing.qty++;
  } else {
    cart.push({ sku: p.sku, nombre: p.nombre, precio: p.precio, qty: 1, stock: p.stock });
  }
  updateCart();
  showToast(p.nombre + ' agregado', true);
}

function changeQty(sku, delta) {
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].sku === sku) {
      cart[i].qty += delta;
      if (cart[i].qty <= 0) {
        cart.splice(i, 1);
      } else if (cart[i].qty > cart[i].stock) {
        cart[i].qty = cart[i].stock;
        showToast('Máximo disponible: ' + cart[i].stock, false);
      }
      break;
    }
  }
  updateCart();
}

function clearCart() {
  cart = [];
  updateCart();
}

function updateCart() {
  var total = 0, count = 0;
  for (var i = 0; i < cart.length; i++) {
    total += cart[i].precio * cart[i].qty;
    count += cart[i].qty;
  }

  el('cartTotal').textContent    = fmt(total);
  el('cartSubtotal').textContent = fmt(total);
  el('cartItemCount').textContent = count + (count === 1 ? ' producto' : ' productos');
  el('btnConfirmar').disabled = cart.length === 0;

  var container = el('cartItems');
  if (!cart.length) {
    container.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>Agrega productos<br>desde el catálogo</p></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < cart.length; i++) {
    var item = cart[i];
    html += '<div class="cart-item">'
      + '<div class="cart-item-info">'
      + '<div class="cart-item-name">' + item.nombre + '</div>'
      + '<div class="cart-item-sku">' + item.sku + '</div>'
      + '<div class="qty-row">'
      + '<button class="qty-btn" onclick="changeQty(\'' + item.sku + '\',-1)">−</button>'
      + '<span class="qty-n">' + item.qty + '</span>'
      + '<button class="qty-btn" onclick="changeQty(\'' + item.sku + '\',1)">+</button>'
      + '<button class="qty-btn del" onclick="changeQty(\'' + item.sku + '\',-99)" title="Eliminar">✕</button>'
      + '</div></div>'
      + '<div class="cart-item-price">' + fmt(item.precio * item.qty) + '</div>'
      + '</div>';
  }
  container.innerHTML = html;
}

// ── CANAL / PAGO ──
function setCanal(canal, btn) {
  canalActual = canal;
  var btns = document.querySelectorAll('.canal-btn');
  for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('active'); }
  btn.classList.add('active');
}

function setPago(pago, btn) {
  pagoActual = pago;
  var btns = document.querySelectorAll('.pago-btn');
  for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('active'); }
  btn.classList.add('active');
}

// ── CONFIRMAR VENTA ──
function confirmarVenta() {
  if (!cart.length) { return; }

  var btn = el('btnConfirmar');
  btn.disabled = true;
  btn.textContent = 'Registrando...';

  var total    = cart.reduce(function(s,i){ return s + i.precio * i.qty; }, 0);
  var vendedor = el('vendedorSelect').value;

  var items = cart.map(function(i) {
    return { sku: i.sku, nombre: i.nombre, cantidad: i.qty, precio: i.precio, total: i.precio * i.qty };
  });

  var payload = JSON.stringify({
    items:    items,
    total:    total,
    canal:    canalActual,
    pago:     pagoActual,
    vendedor: vendedor,
    envio:    'tienda',
    direccion:'Venta en tienda'
  });

  var xhr = new XMLHttpRequest();
  xhr.timeout = 10000;

  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) { return; }
    mostrarExito(total, vendedor, items.length);
  };
  xhr.ontimeout = function() { mostrarExito(total, vendedor, items.length); };
  xhr.onerror   = function() { mostrarExito(total, vendedor, items.length); };

  try {
    xhr.open('POST', APPS_SCRIPT_URL, true);
    xhr.setRequestHeader('Content-Type', 'text/plain');
    xhr.send(payload);
  } catch(e) {
    mostrarExito(total, vendedor, items.length);
  }
}

function mostrarExito(total, vendedor, numItems) {
  var now = new Date();
  var hora = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  el('successSub').textContent   = hora + ' — ' + vendedor + ' — ' + canalActual;
  el('successTotal').textContent = fmt(total);

  var detailHtml = '<div class="success-detail-row"><span>Productos</span><span>' + numItems + ' ítem(s)</span></div>'
    + '<div class="success-detail-row"><span>Medio de pago</span><span>' + pagoActual + '</span></div>'
    + '<div class="success-detail-row"><span>Canal</span><span>' + canalActual + '</span></div>';

  cart.forEach(function(i) {
    detailHtml += '<div class="success-detail-row"><span>' + i.nombre.split(' ').slice(0,3).join(' ') + ' x' + i.qty + '</span><span>' + fmt(i.precio*i.qty) + '</span></div>';
  });

  el('successDetail').innerHTML = detailHtml;

  // Descontar stock localmente
  cart.forEach(function(item) {
    for (var j = 0; j < PRODUCTOS.length; j++) {
      if (PRODUCTOS[j].sku === item.sku) {
        PRODUCTOS[j].stock -= item.qty;
        if (PRODUCTOS[j].stock < 0) { PRODUCTOS[j].stock = 0; }
        break;
      }
    }
  });

  el('successOverlay').classList.add('open');
}

function closeSuccess() {
  el('successOverlay').classList.remove('open');
  cart = [];
  updateCart();
  renderProductos();

  // Reset botón
  var btn = el('btnConfirmar');
  btn.disabled = true;
  btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Confirmar Venta';
}

// ── TOAST ──
function showToast(msg, isGreen) {
  var t = el('toast');
  t.textContent = msg;
  t.className = 'toast' + (isGreen ? ' green' : '') + ' show';
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}
</script>
